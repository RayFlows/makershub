name: makershub-dev

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-makershub_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-makershub_dev}
      MYSQL_USER: ${MYSQL_USER:-makershub}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-makershub}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-makershub}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-makershub_minio}
      MINIO_SERVER_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-http://localhost:9001}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-makershub}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-makershub_minio}
      MINIO_AVATAR_BUCKET: ${MINIO_AVATAR_BUCKET:-makershub-avatars-local}
      MINIO_PUBLIC_BUCKET: ${MINIO_PUBLIC_BUCKET:-makershub-public-local}
      MINIO_RESOURCE_BUCKET: ${MINIO_RESOURCE_BUCKET:-makershub-resources-local}
      MINIO_PROJECT_BUCKET: ${MINIO_PROJECT_BUCKET:-makershub-projects-local}
      MINIO_TEMP_BUCKET: ${MINIO_TEMP_BUCKET:-makershub-temp-local}
    volumes:
      - ./minio/init.sh:/usr/bin/init.sh:ro
    entrypoint: ["/bin/sh", "/usr/bin/init.sh"]

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    environment:
      APP_ENV: local
      UV_PROJECT_ENVIRONMENT: /workspace/.venv/api
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-local-env}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-30}
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
      WECHAT_CODE2SESSION_URL: ${WECHAT_CODE2SESSION_URL:-https://api.weixin.qq.com/sns/jscode2session}
      EMAIL_DELIVERY_MODE: ${EMAIL_DELIVERY_MODE:-log}
      EMAIL_CODE_EXPIRE_MINUTES: ${EMAIL_CODE_EXPIRE_MINUTES:-5}
      EMAIL_CODE_RESEND_INTERVAL_SECONDS: ${EMAIL_CODE_RESEND_INTERVAL_SECONDS:-60}
      EMAIL_CODE_HOURLY_LIMIT: ${EMAIL_CODE_HOURLY_LIMIT:-10}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-true}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-MakersHub}
      DATABASE_URL: ${DATABASE_URL:-mysql+aiomysql://makershub:makershub@mysql:3306/makershub_dev}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_DIR: ${LOG_DIR:-logs}
      LOG_APP_FILE: ${LOG_APP_FILE:-app.log}
      LOG_ERROR_FILE: ${LOG_ERROR_FILE:-error.log}
      LOG_REQUEST_FILE: ${LOG_REQUEST_FILE:-request.log}
      LOG_DEBUG_FILE: ${LOG_DEBUG_FILE:-debug.log}
      LOG_FILE_ENABLED: ${LOG_FILE_ENABLED:-true}
      LOG_CONSOLE_ENABLED: ${LOG_CONSOLE_ENABLED:-true}
      LOG_ROTATION: ${LOG_ROTATION:-00:00}
      LOG_RETENTION: ${LOG_RETENTION:-30 days}
      LOG_ERROR_RETENTION: ${LOG_ERROR_RETENTION:-180 days}
      LOG_REQUEST_RETENTION: ${LOG_REQUEST_RETENTION:-30 days}
      LOG_DEBUG_RETENTION: ${LOG_DEBUG_RETENTION:-7 days}
      LOG_DEBUG_FILE_ENABLED: ${LOG_DEBUG_FILE_ENABLED:-true}
      LOG_COMPRESSION: ${LOG_COMPRESSION:-zip}
      LOG_ENQUEUE: ${LOG_ENQUEUE:-true}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-makershub}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-makershub_minio}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-makershub-local}
      MINIO_AVATAR_BUCKET: ${MINIO_AVATAR_BUCKET:-makershub-avatars-local}
      MINIO_PUBLIC_BUCKET: ${MINIO_PUBLIC_BUCKET:-makershub-public-local}
      MINIO_RESOURCE_BUCKET: ${MINIO_RESOURCE_BUCKET:-makershub-resources-local}
      MINIO_PROJECT_BUCKET: ${MINIO_PROJECT_BUCKET:-makershub-projects-local}
      MINIO_TEMP_BUCKET: ${MINIO_TEMP_BUCKET:-makershub-temp-local}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:5174,http://localhost:5175}
    ports:
      - "8000:8000"
    volumes:
      - ../../apps/api:/workspace/apps/api
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    command: pnpm --filter @makershub/web dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ../..:/workspace
      - node_modules:/workspace/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
    depends_on:
      api:
        condition: service_healthy

  admin:
    build:
      context: ../..
      dockerfile: infra/docker/admin.Dockerfile
    command: pnpm --filter @makershub/admin dev -- --host 0.0.0.0 --port 5174
    ports:
      - "5174:5174"
    volumes:
      - ../..:/workspace
      - node_modules:/workspace/node_modules
      - admin_node_modules:/workspace/apps/admin/node_modules
    depends_on:
      api:
        condition: service_healthy

  docs:
    build:
      context: ../..
      dockerfile: infra/docker/docs.Dockerfile
    command: pnpm --filter @makershub/docs exec vitepress dev docs --host 0.0.0.0 --port 5175
    ports:
      - "5175:5175"
    volumes:
      - ../..:/workspace
      - node_modules:/workspace/node_modules
      - docs_node_modules:/workspace/apps/docs/node_modules

volumes:
  mysql_data:
  minio_data:
  node_modules:
  web_node_modules:
  admin_node_modules:
  docs_node_modules:
