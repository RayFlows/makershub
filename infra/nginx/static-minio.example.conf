# infra/nginx/static-minio.example.conf
#
# MakersHub 公共静态资源反向代理示例
#
# 本配置只暴露 MinIO public bucket 中的公开资源，例如邮件品牌图、公开宣传图等。
# 私有 bucket 不应通过这个域名直接暴露；私有文件必须继续走后端鉴权和短期签名 URL。

upstream makershub_minio_public {
    # 如果 Nginx 和 MinIO 在同一台服务器上，可以使用 127.0.0.1:9000。
    # 如果在同一个 Docker 网络中，可以改成 minio:9000。
    server 127.0.0.1:9000;
}

server {
    listen 80;
    listen [::]:80;
    server_name static.scumaker.com;

    # Certbot HTTP-01 校验入口。不要跳转这个路径，否则证书签发和续期会失败。
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name static.scumaker.com;

    ssl_certificate /etc/letsencrypt/live/static.scumaker.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/static.scumaker.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location = / {
        return 404;
    }

    # 对外 URL:
    #   https://static.scumaker.com/public/brand/SCUMAKER_logowithtext_email.png
    #
    # 实际 MinIO 对象:
    #   makershub-public-prod/brand/SCUMAKER_logowithtext_email.png
    location /public/ {
        limit_except GET HEAD {
            deny all;
        }

        rewrite ^/public/(.*)$ /makershub-public-prod/$1 break;
        proxy_pass http://makershub_minio_public;

        proxy_http_version 1.1;
        proxy_set_header Host 127.0.0.1:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        add_header Cache-Control "public, max-age=86400" always;
        add_header Strict-Transport-Security "max-age=15552000" always;
    }
}
